version: "3.8"

services:

  # =========================
  # KAFKA
  # =========================
  kafka:
    image: bitnami/kafka:latest
    container_name: veltrix-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes

  # =========================
  #  REDIS
  # =========================
  redis:
    image: redis:7
    container_name: veltrix-redis
    ports:
      - "6379:6379"

  # =========================
  #  MINIO
  # =========================
  minio:
    image: minio/minio
    container_name: veltrix-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # =========================
  #  PYTHON RUNTIME
  # =========================
  python-runtime:
    build:
      context: ./python-runtime
    container_name: veltrix-python-runtime
    ports:
      - "50051:50051"

  # =========================
  #  WORKER SERVICE
  # =========================
  worker:
    build:
      context: .
      dockerfile:  worker_service/Dockerfile
    container_name: veltrix-worker
    depends_on:
      - kafka
      - redis
      - minio
      - python-runtime
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      PYTHON_RUNTIME_ADDR: python-runtime:50051

  # =========================
  # SCHEDULER SERVICE
  # =========================
  scheduler:
    build:
      context: .
      dockerfile: scheduler_service/Dockerfile
    container_name: veltrix-scheduler
    depends_on:
      - kafka
    environment:
      SCHEDULER_GRPC_PORT: 50051

      # USING MONGO ATLAS
      MONGO_URI: "${MONGO_URI}"
      MONGO_DB_NAME: veltrix

      KAFKA_BROKERS: kafka:9092
      KAFKA_JOB_TOPIC: execution-jobs
      KAFKA_EVENTS_TOPIC: execution-events
      KAFKA_CONSUMER_GROUP: scheduler-debug

  # =========================
  #  GATEWAY
  # =========================
  gateway:
    build:
      context: .
      dockerfile: gateway_service/Dockerfile
    container_name: veltrix-gateway
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - scheduler
      - minio
    environment:
      PORT: 8080

      # USING MONGO ATLAS
      MONGO_URI: "${MONGO_URI}"

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: code-bucket

      DISABLE_AUTH: "true"

      # gRPC
      SCHEDULER_GRPC_ADDR: scheduler:50051
      PROTO_PATH: /proto/logs.proto

volumes:
  minio_data: