services:

  kafka:
    image: bitnami/kafka:latest
    container_name: veltrix-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    networks:
      - veltrix_net

  redis:
    image: redis:7
    container_name: veltrix-redis
    ports:
      - "6379:6379"
    networks:
      - veltrix_net

  minio:
    image: minio/minio
    container_name: veltrix-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - veltrix_net

  # 🔥 FIXED PYTHON RUNTIME
  python-runtime:
    build:
      context: ./python-runtime   # ✅ FIXED (separate context)
      dockerfile: Dockerfile
    container_name: veltrix-python-runtime

    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp
      - /tmp/executions

    mem_limit: 2g
    cpus: 2
    pids_limit: 100

    networks:
      - veltrix_net

    restart: unless-stopped

  # 🔥 FIXED NODE RUNTIME (needs root context for proto)
  node-runtime:
    build:
      context: .
      dockerfile: node-runtime/Dockerfile
    container_name: veltrix-node-runtime

    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp
      - /tmp/executions

    mem_limit: 2g
    cpus: 2
    pids_limit: 100

    networks:
      - veltrix_net

    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker_service/Dockerfile
    container_name: veltrix-worker
    depends_on:
      - kafka
      - redis
      - minio
      - python-runtime
      - node-runtime
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      PYTHON_RUNTIME_ADDR: python-runtime:50051
      NODE_RUNTIME_ADDR: node-runtime:50052
    networks:
      - veltrix_net

  scheduler:
    build:
      context: .
      dockerfile: scheduler_service/Dockerfile
    container_name: veltrix-scheduler
    depends_on:
      - kafka
    environment:
      SCHEDULER_GRPC_PORT: 50051
      MONGO_URI: "${MONGO_URI}"
      MONGO_DB_NAME: veltrix
      KAFKA_BROKERS: kafka:9092
      KAFKA_JOB_TOPIC: execution-jobs
      KAFKA_EVENTS_TOPIC: execution-events
      KAFKA_CONSUMER_GROUP: scheduler-debug
    networks:
      - veltrix_net

  gateway:
    build:
      context: .
      dockerfile: gateway_service/Dockerfile
    container_name: veltrix-gateway
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - scheduler
      - minio
    environment:
      PORT: 8080
      MONGO_URI: "${MONGO_URI}"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: code-bucket
      DISABLE_AUTH: "true"
      SCHEDULER_GRPC_ADDR: scheduler:50051
      PROTO_PATH: /proto/logs.proto
    networks:
      - veltrix_net

  logs-service:
    build:
      context: .
      dockerfile: logs_service/Dockerfile
    container_name: veltrix-logs
    depends_on:
     - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      LOGS_TOPIC: execution-logs-v2
      LOGS_GRPC_PORT: 50053
    networks:
      - veltrix_net

volumes:
  minio_data:

networks:
  veltrix_net:
    driver: bridge
