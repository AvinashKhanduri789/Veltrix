syntax = "proto3";

package veltrix.scheduler;

option go_package = "veltrix/proto/schedulerpb";

service SchedulerService {

  rpc TriggerExecution (TriggerExecutionRequest)
      returns (TriggerExecutionResponse);

  rpc CancelExecution (CancelExecutionRequest)
      returns (CancelExecutionResponse);

  rpc ReplayExecution (ReplayExecutionRequest)
      returns (ReplayExecutionResponse);
}


message TriggerExecutionRequest {

  string user_id = 1;

  string function_id = 2;

  string version_id = 3;

  string code_storage_path = 4;

  string runtime = 5;

  string input_payload = 6;

  int32 timeout_seconds = 7;
}


message TriggerExecutionResponse {

  string execution_id = 1;

  string status = 2;
}


message CancelExecutionRequest {

  string execution_id = 1;

  string user_id = 2;
}


message CancelExecutionResponse {

  bool accepted = 1;

  string message = 2;
}


message ReplayExecutionRequest {

  string execution_id = 1;

  string user_id = 2;

  string input_override = 3;
}


message ReplayExecutionResponse {

  string new_execution_id = 1;

  string status = 2;
}
